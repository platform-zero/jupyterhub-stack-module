services:
  jupyterhub:
    image: webservices-jupyterhub:5.4.3
    build:
      context: ./stack.containers/jupyterhub
      dockerfile: Dockerfile
    container_name: jupyterhub
    command: ["jupyterhub", "-f", "/config/jupyterhub_config.py"]
    restart: unless-stopped
    networks:
      caddy:
      ai:
      postgres:
    depends_on:
      caddy:
        condition: service_started
      jupyter-notebook-build:
        condition: service_completed_successfully
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    environment:
      DOCKER_NETWORK_NAME: webservices_ai
      JUPYTER_NOTEBOOK_IMAGE: ${JUPYTER_NOTEBOOK_IMAGE:-platform-jupyter-notebook:5.4.3}
      JUPYTER_NOTEBOOK_UID: "1000"
      JUPYTER_NOTEBOOK_GID: "100"
      DOCKER_HOST: unix:///run/podman/podman.sock
      JUPYTERHUB_ALLOWED_REMOTE_GROUPS: ${JUPYTERHUB_ALLOWED_REMOTE_GROUPS:-admins,operators,developers}
      POSTGRES_HOST: postgres-ssd
      POSTGRES_PORT: "5432"
      POSTGRES_DB: webservices
      POSTGRES_USER: ${JUPYTERHUB_POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${JUPYTERHUB_POSTGRES_PASSWORD:-}
    volumes:
      - jupyterhub_data:/srv/jupyterhub
      - ./configs/jupyterhub/jupyterhub_config.py:/config/jupyterhub_config.py:ro
      - ./configs/jupyterhub/templates:/config/templates:ro
      - ${XDG_RUNTIME_DIR:?XDG_RUNTIME_DIR must point at the rootless Podman runtime}/podman/podman.sock:/run/podman/podman.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/hub/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
